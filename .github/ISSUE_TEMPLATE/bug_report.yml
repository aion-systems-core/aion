name: Bug report
description: Report a deterministic execution issue.
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include exact CLI commands and seed/model/prompt where applicable.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Rust version, SealRun (`sealrun --version`) or commit SHA, and relevant output paths.
