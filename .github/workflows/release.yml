name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release binary
        run: cargo build -p aion-cli --release
      - name: Package artifact
        run: |
          mkdir -p dist
          cp target/release/aion dist/aion-linux-amd64
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aion-release
          path: dist/*
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign artifact
        run: cosign sign-blob --yes --output-signature dist/aion-linux-amd64.sig dist/aion-linux-amd64
      - name: Upload signature artifact
        uses: actions/upload-artifact@v4
        with:
          name: aion-release-signature
          path: dist/*.sig
