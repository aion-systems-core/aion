name: CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main
      - feature/**

defaults:
  run:
    shell: bash

jobs:
  ci:
    name: fmt-clippy-build-test
    runs-on: ubuntu-latest

    steps:
      # Checkout source and install stable Rust toolchain.
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Cache Cargo registry/target metadata to speed up CI.
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ runner.os }}-v1

      # Formatting gate.
      - name: rustfmt
        run: cargo fmt --all -- --check

      # Lint gate.
      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      # Build all workspace crates.
      - name: build
        run: cargo build --workspace --all-targets

      # Run all workspace tests.
      - name: test
        run: cargo test --workspace --all-targets

  security-gate:
    name: security-gate
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ runner.os }}-v1

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit (deny warnings)
        run: cargo audit --deny warnings

  smoke-e2e:
    name: smoke-e2e
    runs-on: ubuntu-latest
    needs: security-gate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ runner.os }}-v1

      - name: Run E2E smoke tests
        run: bash scripts/smoke_e2e.sh

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: smoke_report.json
          if-no-files-found: error

  golden-tests:
    name: golden-tests
    runs-on: ubuntu-latest
    needs: security-gate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ runner.os }}-v1

      - name: Run golden checker
        run: cargo test -p aion-cli --test golden_test

      - name: Upload golden reports (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden-reports
          path: golden_reports/
          if-no-files-found: ignore
