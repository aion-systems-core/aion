name: ci

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace
      - name: Test engine
        run: cargo test -p aion-engine
      - name: Test cli
        run: cargo test -p aion-cli
      - name: Product docs links
        run: cargo test -p aion-cli --test product_docs
